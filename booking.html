  <h2>Book your Program</h2>
  
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <label>Full Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Phone</label>
    <input type="tel" name="phone" required>

    <label>Select Programs</label>
    
    <div class="Book Program">
      <span class="Program">Digital Literacy Training - R500 </span>
      <input type="number" name="Digital literacy Training" min="0" value="0" Book Program="Qty">
    </div>

    <div class="Book Program">
      <span class="Program">Mentorship program - R1000</span>
      <input type="number" name="Mentorship program" min="0" value="0" placeholder="Qty">
    </div>

    <div class="Book-Program">
      <span class="Program">Community Workshops R0 FREE </span>
      <input type="number" name="Community Workshop="0" value="0" placeholder="Qty">
    </div>



    <label>Special Instructions</label>
    <textarea name="notes" rows="3" placeholder="Any troubles selecting the Program, etc."></textarea>

    <label>ONLINE OR IN CONTACT</label>
    <select name="IN CONTACT" required>
      <option value="IN CONTACT">In contact</option>
      <option value="ONLINE">Online</option>
    </select>

    <button type="BOOK">Book Program</button>
  </form>
